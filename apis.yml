created: '2026-06-13'
modified: '2026-06-13'
apis:
  - aid: sei:sei-evm-json-rpc-api
    name: Sei EVM JSON-RPC API
    description: >-
      Ethereum-compatible JSON-RPC API for interacting with Sei's EVM layer.
      Supports standard Ethereum methods for sending transactions, querying
      account balances and code, retrieving block and transaction data, managing
      log filters, estimating gas, and tracing transaction execution. Also
      includes Sei-specific extensions for cross-VM address resolution and
      synthetic transaction lookups. The public mainnet endpoint is rate-limited
      to 15 requests per second; dedicated endpoints are available through
      infrastructure providers for production workloads.
    humanURL: https://docs.sei.io/evm/reference
    baseURL: https://evm-rpc.sei-apis.com
    tags:
      - EVM
      - JSON-RPC
      - Ethereum
      - Blockchain
      - Transactions
      - Smart Contracts
    properties:
      - type: Documentation
        url: https://docs.sei.io/evm/reference
      - type: GettingStarted
        url: https://docs.sei.io
      - type: RateLimits
        url: rate-limits/sei-evm-json-rpc-api-rate-limits.yml
      - type: JSONLD
        url: json-ld/sei.jsonld
      - type: Vocabulary
