aid: sei
name: Sei
description: >-
  Sei is a high-performance Layer 1 blockchain optimized for trading and
  decentralized exchange (DEX) applications. It is the first parallelized EVM
  blockchain, delivering sub-second block times (~400ms), 100 MGas/s throughput,
  and full Ethereum compatibility without code changes. Sei combines Twin Turbo
  Consensus, a parallelization engine, and SeiDB to eliminate traditional
  performance bottlenecks. Developers can interact with Sei through EVM
  JSON-RPC endpoints (Ethereum-compatible) and Cosmos REST/LCD endpoints for
  querying markets, orders, accounts, staking, governance, and DEX state on the
  pacific-1 mainnet and atlantic-2 testnet networks.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Blockchain
  - Layer 1
  - EVM
  - DeFi
  - DEX
  - Trading
  - Cosmos
  - Web3
url: >-
  https://raw.githubusercontent.com/api-evangelist/sei/refs/heads/main/apis.yml
