        url: https://github.com/sei-protocol/sei-chain
      - type: Discord
        url: https://discord.gg/sei

  - aid: sei:sei-cosmos-rest-api
    name: Sei Cosmos REST API (LCD)
    description: >-
      Cosmos SDK REST API (Light Client Daemon / LCD) exposing HTTP endpoints
      for querying Sei blockchain state including bank balances and token supply,
      staking delegations and validator info, governance proposals, distribution
      rewards and commissions, minting parameters, IBC channels, and Sei-native
      DEX markets and orders. Available on mainnet (pacific-1) at port 1317 via
      public infrastructure providers. The public REST endpoint is rate-limited
      to 15 requests per second. Swagger/OpenAPI documentation can be enabled
      on self-hosted nodes.
    humanURL: https://docs.sei.io/cosmos-sdk/api
    baseURL: https://rest.sei-apis.com
    tags:
      - Cosmos
      - LCD
      - REST
      - Blockchain
      - Staking
      - Governance
      - DEX
      - Accounts
    properties:
